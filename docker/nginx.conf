server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS for WebAudio + MIDI
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Cache static assets
    location ~* \.(js|css|json|svg|png|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML files: no cache (instant updates)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Presets volume (user-customizable)
    location /presets/ {
        alias /usr/share/nginx/html/presets/;
        autoindex on;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","app":"qbirdsynth","version":"1.0.0"}';
        add_header Content-Type application/json;
    }
}
