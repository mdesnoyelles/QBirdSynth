<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="txtg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="40%" stop-color="#7B1FA2"/>
      <stop offset="70%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FFAB40"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(30,60)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="none" stroke="#7B1FA2" stroke-width="2"/>
    <circle cx="16" cy="-10" r="7" fill="none" stroke="#7B1FA2" stroke-width="1.8"/>
    <circle cx="18.5" cy="-11.5" r="2" fill="#FF6D00"/>
    <path d="M23,-10 L30,-8 L23,-6" fill="none" stroke="#FFAB40" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-8,-6 Q18,-24 28,-4" fill="none" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="62" y="72" font-family="Orbitron,Rajdhani,monospace" font-size="52" font-weight="900" letter-spacing="8" fill="url(#txtg)" filter="url(#glow2)">QBirdSynth</text>
  <text x="64" y="100" font-family="Rajdhani,sans-serif" font-size="14" letter-spacing="6" fill="#B0B0B0">80s retro-futurism synthesizer</text>
  <rect x="64" y="78" width="360" height="1.5" rx="1" fill="#7B1FA2" opacity="0.4">
    <animate attributeName="fill" values="#7B1FA2;#FF6D00;#7B1FA2" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>