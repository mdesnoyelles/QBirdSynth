<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="pkg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="50%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <linearGradient id="pglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="oglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFAB40" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="79" fill="none" stroke="#7B1FA2" stroke-width="2" opacity="0.5"/>
  <!-- Synth keyboard base -->
  <rect x="80" y="280" width="352" height="140" rx="8" fill="#1E1E1E" stroke="#444" stroke-width="1.5"/>
  <!-- White keys -->
  <rect x="96" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="128" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="160" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="192" y="290" width="28" height="118" rx="0 0 4 4" fill="url(#pglow)" filter="url(#neon)" stroke="#7B1FA2" stroke-width="1"/>
  <rect x="224" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="256" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="288" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="320" y="290" width="28" height="118" rx="0 0 4 4" fill="url(#oglow)" filter="url(#neon)" stroke="#FF6D00" stroke-width="1"/>
  <rect x="352" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <rect x="384" y="290" width="28" height="118" rx="0 0 4 4" fill="#ddd" stroke="#999" stroke-width="0.5"/>
  <!-- Black keys -->
  <rect x="115" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="147" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="211" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="243" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="275" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="339" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <rect x="371" y="290" width="18" height="72" rx="0 0 3 3" fill="#222" stroke="#000" stroke-width="0.5"/>
  <!-- Bird silhouette (simplified Q-bird) -->
  <g transform="translate(256,150)" filter="url(#neon2)">
    <ellipse cx="0" cy="0" rx="60" ry="45" fill="none" stroke="url(#pkg)" stroke-width="3"/>
    <path d="M-20,-20 Q60,-60 80,-10" fill="none" stroke="#CE93D8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-10,-30 Q50,-55 70,-20" fill="none" stroke="#FFAB40" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="50" cy="-30" r="18" fill="none" stroke="url(#pkg)" stroke-width="2.5"/>
    <circle cx="56" cy="-34" r="4" fill="#FF6D00" filter="url(#neon)"/>
    <path d="M68,-34 L82,-30 L68,-26" fill="none" stroke="#FFAB40" stroke-width="2" stroke-linecap="round"/>
    <path d="M-55,0 Q-70,-8 -60,-20" fill="none" stroke="#CE93D8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M-60,5 Q-78,-5 -65,-25" fill="none" stroke="#7B1FA2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Sound wave arcs -->
  <g transform="translate(160,140)" opacity="0.4">
    <path d="M0,0 Q10,-15 0,-30" fill="none" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M10,5 Q25,-15 10,-35" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- CRT scanlines hint -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="512" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="4" x2="512" y2="4" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="8" x2="512" y2="8" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="12" x2="512" y2="12" stroke="#fff" stroke-width="1"/>
  </g>
</svg>
